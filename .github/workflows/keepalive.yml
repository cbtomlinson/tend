# Supabase free tier pauses projects it thinks are inactive — and its detector
# watches database/API-gateway traffic, which Tend's Edge Functions don't
# generate. This daily ping keeps the project registering as active.
# (If this workflow itself fails, GitHub emails — that's the signal to look.)
name: Supabase keep-alive

on:
  schedule:
    - cron: '0 13 * * *' # daily, 13:00 UTC (~8–9 AM Eastern)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API gateway
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://phbwrolphwdmjynyttmo.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "auth health: $code"
          [ "$code" = "200" ] || exit 1
      - name: Ping Edge runtime too (vision {ping})
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://phbwrolphwdmjynyttmo.supabase.co/functions/v1/vision" \
            -H "content-type: application/json" \
            -H "x-app-password: ${{ secrets.TEND_APP_PASSWORD }}" \
            -d '{"ping":true}')
          echo "vision ping: $code"
          [ "$code" = "200" ] || exit 1
